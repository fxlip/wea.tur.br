name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Reescrever caminhos absolutos para a subpasta do Pages
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: |
          SLUG="${BASE_PATH#/}"; SLUG="${SLUG%/}"
          if [ -z "$SLUG" ]; then echo "Servido na raiz; nada a reescrever."; exit 0; fi
          echo "Aplicando prefixo /$SLUG aos caminhos absolutos em HTML e CSS..."
          export SLUG
          find _site -type f \( -name '*.html' -o -name '*.css' \) -print0 \
            | xargs -0 perl -i -pe '
                my $s = $ENV{SLUG};
                s{\b(href|src)=(["\x27])/(?!\Q$s\E/|/)}{$1."=".$2."/".$s."/"}ge;
                s{\burl\((["\x27]?)/(?!\Q$s\E/|/)}{"url(".$1."/".$s."/"}ge;
              '
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
